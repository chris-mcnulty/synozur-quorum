openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Quorum — Multi-tenant Board of Advisors API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tenants
  - name: boards
  - name: members
  - name: grounding
  - name: storage
  - name: sessions
  - name: dashboard
  - name: decisions
  - name: presets
  - name: exports
  - name: integrations
paths:
  /presets/advisors:
    get:
      operationId: listAdvisorPresets
      tags: [presets]
      summary: List the curated advisor preset library
      responses:
        "200":
          description: Advisor presets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdvisorPreset" }

  /presets/board-templates:
    get:
      operationId: listBoardTemplates
      tags: [presets]
      summary: List curated board templates that bulk-seat presets
      responses:
        "200":
          description: Board templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardTemplate" }

  /boards/{boardId}/seat-preset:
    post:
      operationId: seatAdvisorPreset
      tags: [presets]
      summary: Seat a single advisor preset onto a board
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeatAdvisorPresetBody" }
      responses:
        "201":
          description: Member seated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }

  /boards/{boardId}/seat-template:
    post:
      operationId: seatBoardTemplate
      tags: [presets]
      summary: Bulk-seat the presets in a board template onto a board
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeatBoardTemplateBody" }
      responses:
        "201":
          description: Members seated
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardMember" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Current auth state
      responses:
        "200":
          description: Auth state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetCurrentAuthUserResponse" }
  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Mobile token exchange
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody" }
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse" }
  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Mobile logout
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogoutMobileSessionResponse" }

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List tenants the current user belongs to
      responses:
        "200":
          description: Tenants list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantMembership" }
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant; current user becomes OWNER
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTenantBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }

  /tenants/{tenantId}/members:
    get:
      operationId: listTenantMembers
      tags: [tenants]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantMember" }
    post:
      operationId: inviteTenantMember
      tags: [tenants]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteTenantMemberBody" }
      responses:
        "201":
          description: Invited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantMember" }

  /tenants/{tenantId}/dashboard:
    get:
      operationId: getTenantDashboard
      tags: [dashboard]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantDashboard" }

  /tenants/{tenantId}/intelligence:
    get:
      operationId: getTenantIntelligence
      tags: [dashboard]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Tenant-level intelligence metrics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantIntelligence" }

  /tenants/{tenantId}/intelligence/backfill-topics:
    post:
      operationId: backfillTenantTopics
      tags: [dashboard]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackfillTopicsBody" }
      responses:
        "200":
          description: Backfill result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackfillTopicsResult" }

  /boards/{boardId}/intelligence:
    get:
      operationId: getBoardIntelligence
      tags: [dashboard]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Board-level intelligence metrics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardIntelligence" }

  /tenants/{tenantId}/boards:
    get:
      operationId: listBoards
      tags: [boards]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Boards
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardSummary" }
    post:
      operationId: createBoard
      tags: [boards]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBoardBody" }
      responses:
        "201":
          description: Board created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Board" }

  /boards/{boardId}:
    get:
      operationId: getBoard
      tags: [boards]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Board with members
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardDetail" }
    patch:
      operationId: updateBoard
      tags: [boards]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBoardBody" }
      responses:
        "200":
          description: Updated board
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Board" }
    delete:
      operationId: deleteBoard
      tags: [boards]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "204":
          description: Deleted

  /boards/{boardId}/members:
    get:
      operationId: listBoardMembers
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardMember" }
    post:
      operationId: createBoardMember
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBoardMemberBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }

  /board-members/{memberId}:
    patch:
      operationId: updateBoardMember
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/MemberIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBoardMemberBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }
    delete:
      operationId: deleteBoardMember
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/MemberIdParam"
      responses:
        "204":
          description: Deleted

  /grounding-documents:
    post:
      operationId: registerGroundingDocument
      tags: [grounding]
      summary: Register an uploaded grounding document and extract text
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterGroundingDocumentBody" }
      responses:
        "201":
          description: Document registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingDocument" }

  /grounding-documents/{documentId}:
    get:
      operationId: getGroundingDocument
      tags: [grounding]
      parameters:
        - $ref: "#/components/parameters/DocumentIdParam"
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingDocument" }

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestUploadUrlBody" }
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestUploadUrlResponse" }

  /boards/{boardId}/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionSummary" }
    post:
      operationId: createSession
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionBody" }
      responses:
        "201":
          description: Session created (status=running)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionSummary" }

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionDetail" }

  /sessions/{sessionId}/branch:
    post:
      operationId: branchSession
      tags: [sessions]
      summary: Fork a completed session with one variable changed
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BranchSessionBody" }
      responses:
        "201":
          description: Branched session created (status=running)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionSummary" }

  /sessions/{sessionId}/lineage:
    get:
      operationId: getSessionLineage
      tags: [sessions]
      summary: Parent / siblings / children of a session
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Lineage tree
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionLineage" }

  /sessions/compare:
    post:
      operationId: compareSessions
      tags: [sessions]
      summary: Side-by-side comparison of 2-4 sessions with Master delta synthesis
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompareSessionsBody" }
      responses:
        "200":
          description: Compare payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionCompareResult" }

  /sessions/{sessionId}/memo:
    get:
      operationId: getSessionMemo
      tags: [exports]
      summary: Get the structured memo data for a session
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Memo data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionMemo" }

  /sessions/{sessionId}/memo.md:
    get:
      operationId: getSessionMemoMarkdown
      tags: [exports]
      summary: Get the memo as Markdown
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Markdown text
          content:
            text/markdown:
              schema: { type: string }

  /sessions/{sessionId}/memo.pdf:
    get:
      operationId: getSessionMemoPdf
      tags: [exports]
      summary: Render the memo as a PDF (server-side)
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /sessions/{sessionId}/exports:
    get:
      operationId: listSessionExports
      tags: [exports]
      summary: List previously made exports for this session
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Export log
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionExportRecord" }

  /sessions/{sessionId}/export/slack:
    post:
      operationId: exportSessionToSlack
      tags: [exports]
      summary: Post the memo digest to a Slack channel
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportToSlackBody" }
      responses:
        "200":
          description: Posted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionExportRecord" }

  /sessions/{sessionId}/export/notion:
    post:
      operationId: exportSessionToNotion
      tags: [exports]
      summary: Push the memo as a new Notion page under a chosen parent
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportToNotionBody" }
      responses:
        "200":
          description: Pushed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionExportRecord" }

  /integrations/status:
    get:
      operationId: getIntegrationsStatus
      tags: [integrations]
      summary: Status of optional outbound integrations (Slack, Notion)
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationsStatus" }

  /integrations/slack/channels:
    get:
      operationId: listSlackChannels
      tags: [integrations]
      summary: List Slack channels the connected account can post to
      responses:
        "200":
          description: Channels
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SlackChannel" }

  /integrations/notion/pages:
    get:
      operationId: listNotionParentPages
      tags: [integrations]
      summary: List Notion pages that can be used as a parent for a new memo page
      responses:
        "200":
          description: Pages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotionPage" }

  /tenants/{tenantId}/connections:
    get:
      operationId: listTenantConnections
      tags: [connections]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Connection statuses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantConnection" }

  /tenants/{tenantId}/connections/{provider}:
    post:
      operationId: enableTenantConnection
      tags: [connections]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
        - { name: provider, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: Activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantConnection" }
    delete:
      operationId: disableTenantConnection
      tags: [connections]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
        - { name: provider, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }

  /grounding-selectors:
    get:
      operationId: listGroundingSelectors
      tags: [grounding-selectors]
      parameters:
        - { name: boardId, in: query, required: false, schema: { type: string } }
        - { name: memberId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Selectors
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroundingSelector" }
    post:
      operationId: createGroundingSelector
      tags: [grounding-selectors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGroundingSelectorBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingSelector" }

  /grounding-selectors/{id}:
    patch:
      operationId: updateGroundingSelector
      tags: [grounding-selectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateGroundingSelectorBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingSelector" }
    delete:
      operationId: deleteGroundingSelector
      tags: [grounding-selectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }

  /grounding-selectors/{id}/refresh:
    post:
      operationId: refreshGroundingSelector
      tags: [grounding-selectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingRefreshResult" }

  /tenants/{tenantId}/grounding-refresh-diffs:
    get:
      operationId: listGroundingRefreshDiffs
      tags: [grounding-selectors]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
        - { name: unacknowledged, in: query, required: false, schema: { type: boolean } }
        - { name: material, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Diffs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroundingRefreshDiff" }

  /grounding-refresh-diffs/{id}/acknowledge:
    post:
      operationId: acknowledgeGroundingRefreshDiff
      tags: [grounding-selectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingRefreshDiff" }

  /tenants/{tenantId}/notifications:
    get:
      operationId: listTenantNotifications
      tags: [grounding-selectors]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
        - { name: unread, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantNotification" }

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [grounding-selectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantNotification" }

  /grounding-selectors/preview:
    post:
      operationId: previewGroundingSelector
      tags: [grounding-selectors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PreviewGroundingSelectorBody" }
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroundingSelectorPreview" }

  /sessions/{sessionId}/grounding-snapshots:
    get:
      operationId: listSessionGroundingSnapshots
      tags: [grounding-selectors]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Snapshots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionGroundingSnapshot" }

  /boards/{boardId}/decisions:
    get:
      operationId: listBoardDecisions
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Decisions for a board
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Decision" }

  /tenants/{tenantId}/decisions:
    get:
      operationId: listTenantDecisions
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
        - name: status
          in: query
          required: false
          schema: { $ref: "#/components/schemas/DecisionStatus" }
        - name: tag
          in: query
          required: false
          schema: { $ref: "#/components/schemas/OutcomeTag" }
      responses:
        "200":
          description: Decisions for a tenant
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Decision" }

  /tenants/{tenantId}/decisions/due-for-review:
    get:
      operationId: listDecisionsDueForReview
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/TenantIdParam"
      responses:
        "200":
          description: Decisions older than 30 days with no recorded outcome
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Decision" }

  /decisions/{decisionId}:
    get:
      operationId: getDecision
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/DecisionIdParam"
      responses:
        "200":
          description: Decision with outcome
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }
    patch:
      operationId: updateDecisionStatus
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/DecisionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDecisionBody" }
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }

  /decisions/{decisionId}/outcome:
    post:
      operationId: recordDecisionOutcome
      tags: [decisions]
      parameters:
        - $ref: "#/components/parameters/DecisionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordDecisionOutcomeBody" }
      responses:
        "200":
          description: Outcome recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }

  /sessions/{sessionId}/comments:
    get:
      operationId: listSessionComments
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionComment" }
    post:
      operationId: createSessionComment
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionCommentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionComment" }

  /sessions/{sessionId}/reactions:
    get:
      operationId: listSessionReactions
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Reactions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionReaction" }
    post:
      operationId: toggleSessionReaction
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToggleSessionReactionBody" }
      responses:
        "200":
          description: Reaction state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToggleSessionReactionResponse" }

  /sessions/{sessionId}/follow-ups:
    get:
      operationId: listFollowUpProposals
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Follow-up proposals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FollowUpProposal" }
    post:
      operationId: createFollowUpProposal
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFollowUpProposalBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowUpProposal" }

  /sessions/{sessionId}/follow-ups/{proposalId}/dispatch:
    post:
      operationId: dispatchFollowUpProposal
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
        - name: proposalId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Branched session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DispatchFollowUpResponse" }

  /sessions/{sessionId}/presence:
    get:
      operationId: listSessionPresence
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Currently watching users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PresenceUser" }
    post:
      operationId: pingSessionPresence
      tags: [sessions]
      parameters:
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Updated presence list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PresenceUser" }

components:
  parameters:
    TenantIdParam:
      name: tenantId
      in: path
      required: true
      schema: { type: string }
    BoardIdParam:
      name: boardId
      in: path
      required: true
      schema: { type: string }
    MemberIdParam:
      name: memberId
      in: path
      required: true
      schema: { type: string }
    DocumentIdParam:
      name: documentId
      in: path
      required: true
      schema: { type: string }
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema: { type: string }
    DecisionIdParam:
      name: decisionId
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    AuthUser:
      type: object
      properties:
        id: { type: string }
        email: { type: ["string", "null"] }
        firstName: { type: ["string", "null"] }
        lastName: { type: ["string", "null"] }
        profileImageUrl: { type: ["string", "null"] }
      required: [id, email, firstName, lastName, profileImageUrl]

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - { $ref: "#/components/schemas/AuthUser" }
            - { type: "null" }
      required: [user]

    ExchangeMobileAuthorizationCodeBody:
      type: object
      properties:
        code: { type: string, minLength: 1 }
        code_verifier: { type: string, minLength: 1 }
        redirect_uri: { type: string, minLength: 1, format: uri }
        state: { type: string, minLength: 1 }
        nonce: { type: ["string", "null"] }
      required: [code, code_verifier, redirect_uri, state]

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      properties:
        token: { type: string }
      required: [token]

    LogoutMobileSessionResponse:
      type: object
      properties:
        success: { type: boolean }
      required: [success]

    Tenant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, name, slug, createdAt]

    TenantMembership:
      type: object
      properties:
        tenant: { $ref: "#/components/schemas/Tenant" }
        role: { type: string, enum: [OWNER, ADMIN, EDITOR, VIEWER] }
        joinedAt: { type: string, format: date-time }
      required: [tenant, role, joinedAt]

    TenantMember:
      type: object
      properties:
        userId: { type: string }
        email: { type: ["string", "null"] }
        displayName: { type: ["string", "null"] }
        role: { type: string, enum: [OWNER, ADMIN, EDITOR, VIEWER] }
        joinedAt: { type: string, format: date-time }
      required: [userId, role, joinedAt]

    CreateTenantBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        slug: { type: string, minLength: 2, maxLength: 60, pattern: "^[a-z0-9-]+$" }
      required: [name, slug]

    InviteTenantMemberBody:
      type: object
      properties:
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, EDITOR, VIEWER] }
      required: [email, role]

    BoardSize:
      type: integer
      enum: [3, 5, 7, 9]

    SessionMode:
      type: string
      enum: [ADVISORY, BOARD, REVIEW]

    SessionStatus:
      type: string
      enum: [running, complete, failed]

    ContributionStatus:
      type: string
      enum: [pending, complete, timeout, refused, error]

    Vote:
      type: string
      enum: [YES, NO, ABSTAIN]

    BoardSummary:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        topicArea: { type: ["string", "null"] }
        size: { $ref: "#/components/schemas/BoardSize" }
        memberCount: { type: integer }
        sessionCount: { type: integer }
        lastSessionAt: { type: ["string", "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, tenantId, name, size, memberCount, sessionCount, updatedAt]

    Board:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        topicArea: { type: ["string", "null"] }
        masterInstructionsText: { type: string }
        size: { $ref: "#/components/schemas/BoardSize" }
        defaultMemberModel: { type: string }
        defaultMasterModel: { type: string }
        temperature: { type: number }
        createdBy: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, tenantId, name, masterInstructionsText, size, defaultMemberModel, defaultMasterModel, temperature, createdAt, updatedAt]

    BoardMember:
      type: object
      properties:
        id: { type: string }
        boardId: { type: string }
        name: { type: string }
        roleTitle: { type: string }
        lensDescription: { type: ["string", "null"] }
        instructionsText: { type: string }
        groundingDocumentId: { type: ["string", "null"] }
        groundingDocument:
          oneOf:
            - { $ref: "#/components/schemas/GroundingDocument" }
            - { type: "null" }
        modelOverride: { type: ["string", "null"] }
        ordering: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, boardId, name, roleTitle, instructionsText, ordering, createdAt]

    BoardDetail:
      allOf:
        - $ref: "#/components/schemas/Board"
        - type: object
          properties:
            members:
              type: array
              items: { $ref: "#/components/schemas/BoardMember" }
          required: [members]

    CreateBoardBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: ["string", "null"] }
        topicArea: { type: ["string", "null"] }
        size: { $ref: "#/components/schemas/BoardSize" }
        masterInstructionsText: { type: ["string", "null"] }
      required: [name, size]

    UpdateBoardBody:
      type: object
      properties:
        name: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        topicArea: { type: ["string", "null"] }
        masterInstructionsText: { type: ["string", "null"] }
        size:
          oneOf:
            - { $ref: "#/components/schemas/BoardSize" }
            - { type: "null" }
        defaultMemberModel: { type: ["string", "null"] }
        defaultMasterModel: { type: ["string", "null"] }
        temperature: { type: ["number", "null"] }

    CreateBoardMemberBody:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        roleTitle: { type: string, minLength: 1, maxLength: 200 }
        lensDescription: { type: ["string", "null"] }
        instructionsText: { type: ["string", "null"] }
        groundingDocumentId: { type: ["string", "null"] }
        modelOverride: { type: ["string", "null"] }
      required: [name, roleTitle]

    UpdateBoardMemberBody:
      type: object
      properties:
        name: { type: ["string", "null"] }
        roleTitle: { type: ["string", "null"] }
        lensDescription: { type: ["string", "null"] }
        instructionsText: { type: ["string", "null"] }
        groundingDocumentId: { type: ["string", "null"] }
        modelOverride: { type: ["string", "null"] }
        ordering: { type: ["integer", "null"] }

    GroundingDocument:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        filename: { type: string }
        contentType: { type: string }
        storagePath: { type: string }
        characterCount: { type: integer }
        truncated: { type: boolean }
        uploadedAt: { type: string, format: date-time }
      required: [id, tenantId, filename, contentType, storagePath, characterCount, truncated, uploadedAt]

    RegisterGroundingDocumentBody:
      type: object
      properties:
        tenantId: { type: string }
        objectPath: { type: string }
        filename: { type: string }
        contentType: { type: string }
        size: { type: integer }
      required: [tenantId, objectPath, filename, contentType, size]

    RequestUploadUrlBody:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
      required: [uploadURL, objectPath]

    SessionSummary:
      type: object
      properties:
        id: { type: string }
        boardId: { type: string }
        mode: { $ref: "#/components/schemas/SessionMode" }
        questionText: { type: string }
        status: { $ref: "#/components/schemas/SessionStatus" }
        startedAt: { type: string, format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        totalCostCents: { type: ["integer", "null"] }
        parentSessionId: { type: ["string", "null"] }
        branchNote: { type: ["string", "null"] }
      required: [id, boardId, mode, questionText, status, startedAt]

    SessionContribution:
      type: object
      properties:
        id: { type: string }
        sessionId: { type: string }
        boardMemberId: { type: ["string", "null"] }
        memberName: { type: ["string", "null"] }
        memberRoleTitle: { type: ["string", "null"] }
        contributionText: { type: ["string", "null"] }
        vote:
          oneOf:
            - { $ref: "#/components/schemas/Vote" }
            - { type: "null" }
        voteRationale: { type: ["string", "null"] }
        inputTokens: { type: ["integer", "null"] }
        outputTokens: { type: ["integer", "null"] }
        latencyMs: { type: ["integer", "null"] }
        status: { $ref: "#/components/schemas/ContributionStatus" }
        errorDetail: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, sessionId, status, createdAt]

    SessionSummaryRecord:
      type: object
      properties:
        id: { type: string }
        sessionId: { type: string }
        chairsFraming: { type: ["string", "null"] }
        convergenceNote: { type: ["string", "null"] }
        openQuestionsText: { type: ["string", "null"] }
        finalSummary: { type: ["string", "null"] }
        flagsRaisedText: { type: ["string", "null"] }
        totalCostCents: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, sessionId, createdAt]

    SessionDetail:
      type: object
      properties:
        session: { $ref: "#/components/schemas/SessionSummary" }
        board: { $ref: "#/components/schemas/Board" }
        establishedFactsText: { type: ["string", "null"] }
        contributions:
          type: array
          items: { $ref: "#/components/schemas/SessionContribution" }
        summary:
          oneOf:
            - { $ref: "#/components/schemas/SessionSummaryRecord" }
            - { type: "null" }
      required: [session, board, contributions]

    BranchSessionBody:
      type: object
      properties:
        questionText: { type: string, minLength: 1, maxLength: 8000 }
        branchNote: { type: string, minLength: 1, maxLength: 2000 }
        mode:
          oneOf:
            - { $ref: "#/components/schemas/SessionMode" }
            - { type: "null" }
      required: [questionText, branchNote]

    SessionLineage:
      type: object
      properties:
        sessionId: { type: string }
        parent:
          oneOf:
            - { $ref: "#/components/schemas/SessionSummary" }
            - { type: "null" }
        siblings:
          type: array
          items: { $ref: "#/components/schemas/SessionSummary" }
        children:
          type: array
          items: { $ref: "#/components/schemas/SessionSummary" }
      required: [sessionId, parent, siblings, children]

    CompareSessionsBody:
      type: object
      properties:
        sessionIds:
          type: array
          minItems: 2
          maxItems: 4
          items: { type: string }
      required: [sessionIds]

    SessionCompareEntry:
      type: object
      properties:
        session: { $ref: "#/components/schemas/SessionSummary" }
        boardName: { type: string }
        establishedFactsText: { type: ["string", "null"] }
        contributions:
          type: array
          items: { $ref: "#/components/schemas/SessionContribution" }
        summary:
          oneOf:
            - { $ref: "#/components/schemas/SessionSummaryRecord" }
            - { type: "null" }
      required: [session, boardName, contributions]

    SessionCompareResult:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/SessionCompareEntry" }
        deltaNote: { type: string }
        memberAlignments:
          type: array
          items:
            type: object
            properties:
              memberKey: { type: string }
              memberName: { type: string }
              memberRoleTitle: { type: string }
              perSession:
                type: array
                items:
                  oneOf:
                    - { $ref: "#/components/schemas/SessionContribution" }
                    - { type: "null" }
            required: [memberKey, memberName, memberRoleTitle, perSession]
      required: [entries, deltaNote, memberAlignments]

    PresetCategory:
      type: string
      enum: [strategy, capital, operations, product, risk, people]

    PresetKind:
      type: string
      enum: [archetype, specialist, famous]

    AdvisorPreset:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }
        roleTitle: { type: string }
        category: { $ref: "#/components/schemas/PresetCategory" }
        kind: { $ref: "#/components/schemas/PresetKind" }
        tags:
          type: array
          items: { type: string }
        lensDescription: { type: string }
        instructionsText: { type: string }
      required: [slug, name, roleTitle, category, kind, tags, lensDescription, instructionsText]

    BoardTemplate:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        size: { $ref: "#/components/schemas/BoardSize" }
        topicArea: { type: string }
        presetSlugs:
          type: array
          items: { type: string }
        presets:
          type: array
          items: { $ref: "#/components/schemas/AdvisorPreset" }
      required: [slug, name, description, size, topicArea, presetSlugs, presets]

    SeatAdvisorPresetBody:
      type: object
      properties:
        presetSlug: { type: string, minLength: 1 }
      required: [presetSlug]

    SeatBoardTemplateBody:
      type: object
      properties:
        templateSlug: { type: string, minLength: 1 }
        replaceExisting: { type: boolean }
      required: [templateSlug]

    CreateSessionBody:
      type: object
      properties:
        mode: { $ref: "#/components/schemas/SessionMode" }
        questionText: { type: string, minLength: 1, maxLength: 8000 }
        allHands: { type: boolean }
        includeResolvedDecisions: { type: boolean }
      required: [mode, questionText]

    GroundingProviderName:
      type: string
      enum: [linear, notion, google-docs, github, slack, jira, hubspot]

    TenantConnection:
      type: object
      properties:
        id: { type: ["string", "null"] }
        tenantId: { type: string }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        accountLabel: { type: ["string", "null"] }
        enabledAt: { type: ["string", "null"], format: date-time }
        available: { type: boolean }
      required: [tenantId, provider, available]

    GroundingSelector:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        boardId: { type: ["string", "null"] }
        boardMemberId: { type: ["string", "null"] }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        name: { type: string }
        queryJson:
          type: object
          additionalProperties: true
        tokenBudget: { type: integer }
        ordering: { type: integer }
        autoRefreshEnabled: { type: boolean }
        lastRefreshedAt: { type: ["string", "null"], format: date-time }
        lastContentHash: { type: ["string", "null"] }
        lastTokenEstimate: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, tenantId, provider, name, queryJson, tokenBudget, ordering, autoRefreshEnabled, createdAt, updatedAt]

    CreateGroundingSelectorBody:
      type: object
      properties:
        boardId: { type: ["string", "null"] }
        boardMemberId: { type: ["string", "null"] }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        name: { type: string, minLength: 1, maxLength: 200 }
        queryJson:
          type: object
          additionalProperties: true
        tokenBudget: { type: integer, minimum: 200, maximum: 20000 }
        autoRefreshEnabled: { type: boolean }
      required: [provider, name, queryJson]

    UpdateGroundingSelectorBody:
      type: object
      properties:
        name: { type: string }
        queryJson:
          type: object
          additionalProperties: true
        tokenBudget: { type: integer, minimum: 200, maximum: 20000 }
        autoRefreshEnabled: { type: boolean }

    GroundingRefreshResult:
      type: object
      properties:
        selectorId: { type: string }
        changeKind: { type: string }
        materiallyChanged: { type: boolean }
        diffId: { type: ["string", "null"] }
        fetchStatus: { type: string }
      required: [selectorId, changeKind, materiallyChanged, fetchStatus]

    GroundingRefreshDiff:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        selectorId: { type: string }
        boardId: { type: ["string", "null"] }
        boardMemberId: { type: ["string", "null"] }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        selectorName: { type: string }
        previousHash: { type: ["string", "null"] }
        newHash: { type: string }
        previousTokenEstimate: { type: ["integer", "null"] }
        newTokenEstimate: { type: integer }
        changeKind: { type: string }
        materiallyChanged: { type: boolean }
        fetchStatus: { type: string }
        errorDetail: { type: ["string", "null"] }
        contentSnippet: { type: string }
        acknowledgedAt: { type: ["string", "null"], format: date-time }
        acknowledgedBy: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, tenantId, selectorId, provider, selectorName, newHash, newTokenEstimate, changeKind, materiallyChanged, fetchStatus, contentSnippet, createdAt]

    TenantNotification:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        userId: { type: string }
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        refType: { type: ["string", "null"] }
        refId: { type: ["string", "null"] }
        payload:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        readAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, tenantId, userId, kind, title, body, createdAt]

    PreviewGroundingSelectorBody:
      type: object
      properties:
        tenantId: { type: string }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        queryJson:
          type: object
          additionalProperties: true
        tokenBudget: { type: integer, minimum: 200, maximum: 20000 }
      required: [tenantId, provider, queryJson]

    GroundingSelectorPreview:
      type: object
      properties:
        contentText: { type: string }
        tokenEstimate: { type: integer }
        truncated: { type: boolean }
        status: { type: string, enum: [ok, empty, error, not_connected] }
        errorDetail: { type: ["string", "null"] }
      required: [contentText, tokenEstimate, truncated, status]

    SessionGroundingSnapshot:
      type: object
      properties:
        id: { type: string }
        sessionId: { type: string }
        selectorId: { type: ["string", "null"] }
        boardMemberId: { type: ["string", "null"] }
        provider: { $ref: "#/components/schemas/GroundingProviderName" }
        selectorName: { type: string }
        queryJson:
          type: object
          additionalProperties: true
        contentText: { type: string }
        tokenEstimate: { type: integer }
        truncated: { type: boolean }
        fetchStatus: { type: string }
        errorDetail: { type: ["string", "null"] }
        fetchedAt: { type: string, format: date-time }
      required: [id, sessionId, provider, selectorName, queryJson, contentText, tokenEstimate, truncated, fetchStatus, fetchedAt]

    DecisionStatus:
      type: string
      enum: [PENDING, ACTED, DECLINED, OVERRIDDEN]

    OutcomeTag:
      type: string
      enum: [WIN, LOSS, MIXED, TOO_EARLY]

    DecisionOutcome:
      type: object
      properties:
        id: { type: string }
        decisionId: { type: string }
        tag: { $ref: "#/components/schemas/OutcomeTag" }
        noteText: { type: ["string", "null"] }
